<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights | SENSE Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        body { background-color: #606d77; }
    </style>
</head>
<body class="text-gray-900 font-sans">

    <nav class="fixed w-full z-50 transition-all duration-300 p-6 text-white" id="navbar">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter">SENSE INSTITUTE</a>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="index.html" class="hover:opacity-70 transition">HOME</a>
                <a href="about.html" class="hover:opacity-70 transition">ABOUT</a>
                <a href="labs.html" class="hover:opacity-70 transition">LABS</a>
                <a href="insights.html" class="hover:opacity-70 transition underline underline-offset-4">INSIGHTS</a>
                <a href="programs.html" class="hover:opacity-70 transition">PROGRAMS</a>
                <a href="contact.html" class="hover:opacity-70 transition">CONTACT</a>
            </div>
        </div>
    </nav>

    <!-- Coming Soon -->
    <section class="min-h-screen flex flex-col items-center justify-center text-center text-white px-6"
             style="background-color: #606d77;">
        <h1 class="text-7xl md:text-9xl font-bold tracking-widest opacity-10 mb-6 select-none">INSIGHTS</h1>
        <p class="text-2xl md:text-3xl font-light text-gray-200 mb-4">Coming Soon</p>
        <p class="text-gray-400 mt-2 max-w-md text-sm leading-relaxed">
            We're building this section. Check back soon for research insights, publications, and reports
            from our labs and programs.
        </p>
        <a href="index.html"
           class="mt-10 text-sm text-gray-400 hover:text-white underline underline-offset-4 transition">
            ← Back to Home
        </a>
    </section>

    <footer class="py-12 border-t border-white/10 text-center text-gray-300" style="background-color: #606d77;">
        <p class="text-sm">© 2026 SENSE Institute. All rights reserved.</p>
        <p class="text-xs mt-2">senseinstitute@gmail.com</p>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('bg-white', 'text-gray-900', 'shadow-md');
                nav.classList.remove('text-white');
            } else {
                nav.classList.remove('bg-white', 'text-gray-900', 'shadow-md');
                nav.classList.add('text-white');
            }
        });
    </script>
</body>
</html>
